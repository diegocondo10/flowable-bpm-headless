name: flowable-test

services:
  flowable:
    image: flowable/flowable-ui:6.8.0
    restart: unless-stopped
    environment:
      SERVER_PORT: 8090

      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://${FLOWABLE_DB_HOST}:${FLOWABLE_DB_PORT}/${FLOWABLE_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${FLOWABLE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${FLOWABLE_DB_PASSWORD}

      FLOWABLE_IDM_APP_ADMIN_USER_ID: ${FLOWABLE_ADMIN_USER}
      FLOWABLE_IDM_APP_ADMIN_PASSWORD: ${FLOWABLE_ADMIN_PASSWORD}
      FLOWABLE_IDM_APP_ADMIN_FIRST_NAME: ${FLOWABLE_ADMIN_FIRST_NAME}
      FLOWABLE_IDM_APP_ADMIN_LAST_NAME: ${FLOWABLE_ADMIN_LAST_NAME}
      FLOWABLE_IDM_APP_ADMIN_EMAIL: ${FLOWABLE_ADMIN_EMAIL}

      FLOWABLE_COMMON_APP_IDM_ADMIN_USER: ${FLOWABLE_ADMIN_USER}
      FLOWABLE_COMMON_APP_IDM_ADMIN_PASSWORD: ${FLOWABLE_ADMIN_PASSWORD}

      JAVA_OPTS: -Xms512m -Xmx1024m
    ports:
      - "8090:8090"
